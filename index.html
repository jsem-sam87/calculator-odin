<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div class="result_div">3 + 5 = 8</div>
    <div class="button_div">
        <div class="button_div_line">
            <button id="btn7" onclick="addNum(this)">7</button>
            <button id="btn8" onclick="addNum(this)">8</button>
            <button id="btn9" onclick="addNum(this)">9</button>
            <button id="btnAdd" class="operators" onclick="addOperator(this)">+</button>
        </div>
        <div class="button_div_line">
            <button id="btn4" onclick="addNum(this)">4</button>
            <button id="btn5" onclick="addNum(this)">5</button>
            <button id="btn6" onclick="addNum(this)">6</button>
            <button id="btnSubtract" class="operators" onclick="addOperator(this)">-</button>
        </div>    
        <div class="button_div_line">
            <button id="btn1" onclick="addNum(this)">1</button>
            <button id="btn2" onclick="addNum(this)">2</button>
            <button id="btn3" onclick="addNum(this)">3</button>
            <button id="btnMultiply" class="operators" onclick="addOperator(this)">*</button>
        </div>
        <div class="button_div_line">
            <button id="btnC" onclick="funC()">C</button>
            <button id="btn0" onclick="addNum(this)">0</button>
            <button id="btnEquals">=</button>
            <button id="btnDivide" class="operators" onclick="addOperator(this)">/</button>
        </div>               
    </div>
</body>
</html>
