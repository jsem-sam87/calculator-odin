<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <div class="result_div">3 + 5 = 8</div>
    <div class="button_div">
        <div class="button_div_line">
            <button id="btn7">7</button>
            <button id="btn8">8</button>
            <button id="btn9">9</button>
            <button id="btnAdd" class="operators">+</button>
        </div>
        <div class="button_div_line">
            <button id="btn4">4</button>
            <button id="btn5">5</button>
            <button id="btn6">6</button>
            <button id="btnSubtract" class="operators">-</button>
        </div>    
        <div class="button_div_line">
            <button id="btn1">1</button>
            <button id="btn2">2</button>
            <button id="btn3">3</button>
            <button id="btnMultiply" class="operators">*</button>
        </div>
        <div class="button_div_line">
            <button id="btnC">C</button>
            <button id="btn0">0</button>
            <button id="btnEquals">=</button>
            <button id="btnDivide" class="operators">/</button>
        </div>               
    </div>
</body>
</html>
